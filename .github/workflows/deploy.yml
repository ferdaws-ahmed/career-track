name: CareerTrack Manual CI/CD Pipeline

on:
  workflow_dispatch: 

jobs:
  # ১. Render Backend Deploy
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ২. Vercel Frontend Deploy (Monorepo)
  deploy-frontend:
    name: Deploy Client to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        env:
          # Explicitly set the VITE_API_URL here to ensure it's available at build time
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          echo "VITE_API_URL set to: $VITE_API_URL"
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
